apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: pidevagentai
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    alerting:
      alertmanagers:
        - static_configs:
            - targets: ['alertmanager:9093']

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ['prometheus:9090']

      - job_name: backend
        metrics_path: /metrics
        static_configs:
          - targets: ['backend.pidevagentai.svc.cluster.local:80']
            labels:
              service: nestjs-backend

      - job_name: loki
        static_configs:
          - targets: ['loki:3100']

      - job_name: alertmanager
        static_configs:
          - targets: ['alertmanager:9093']

      - job_name: kube-state-metrics
        static_configs:
          - targets: ['kube-state-metrics:8080']
