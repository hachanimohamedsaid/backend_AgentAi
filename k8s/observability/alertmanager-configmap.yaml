apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: pidevagentai
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      receiver: default
      group_by: ['alertname', 'job']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 2h

    receivers:
      - name: default
        webhook_configs:
          - url: http://backend.pidevagentai.svc.cluster.local/alerts
            send_resolved: true
