apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: pidevagentai
data:
  datasources.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: true
      - name: Loki
        uid: loki
        type: loki
        access: proxy
        url: http://loki:3100
        editable: true
